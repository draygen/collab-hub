name: Traffic Tracker
on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9am UTC
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch traffic stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          VIEWS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/traffic/views)
          CLONES=$(curl -s -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/traffic/clones)
          REFERRERS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/traffic/popular/referrers)

          mkdir -p traffic
          echo "## $DATE" >> traffic/log.md
          echo "**Views:** $(echo $VIEWS | python3 -c 'import json,sys; d=json.load(sys.stdin); print(f\"{d[\"count\"]} total, {d[\"uniques\"]} unique\")')" >> traffic/log.md
          echo "**Clones:** $(echo $CLONES | python3 -c 'import json,sys; d=json.load(sys.stdin); print(f\"{d[\"count\"]} total, {d[\"uniques\"]} unique\")')" >> traffic/log.md
          echo "**Top referrers:**" >> traffic/log.md
          echo $REFERRERS | python3 -c 'import json,sys; [print(f"- {r[\"referrer\"]}: {r[\"count\"]}") for r in json.load(sys.stdin)]' >> traffic/log.md
          echo "" >> traffic/log.md

      - name: Commit stats
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "Traffic Bot"
          git add traffic/log.md
          git diff --staged --quiet || git commit -m "traffic: weekly stats $(date +%Y-%m-%d)"
          git push
